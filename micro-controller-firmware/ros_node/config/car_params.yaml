# Car Odometry Configuration Parameters

car_odometry_node:
  ros__parameters:
    # Physical robot parameters
    wheel_radius: 0.0325    # 32.5mm wheel radius (meters)
    wheelbase: 0.185        # 18.5cm wheelbase (meters)
    track_width: 0.15       # 15cm track width (meters)
    
    # Publishing parameters
    publish_rate: 50.0       # 50Hz odometry publishing rate
    frame_id: "odom"         # Odometry frame
    child_frame_id: "base_link"  # Base link frame
    
    # Velocity filtering parameters (to prevent drift)
    velocity_threshold: 0.001    # Minimum linear velocity (m/s) - below this is treated as 0
    angular_threshold: 0.001    # Minimum angular velocity (rad/s) - below this is treated as 0
    
    # Control parameters
    encoder_offset: 187.5        # Steering encoder offset in degrees (0-360)
    max_steering_angle: 30.0    # Maximum steering angle in degrees
    max_rpm: 300.0              # Maximum motor RPM
    
    # Debug parameters
    debug_log_frequency: 50  # Log every Nth message (set to 0 to disable)
    
    # Covariance parameters (adjust based on sensor quality)
    position_covariance:
      xx: 0.1    # X position variance
      yy: 0.1    # Y position variance
      zz: 0.1    # Z position variance
      roll: 0.1  # Roll variance
      pitch: 0.1 # Pitch variance
      yaw: 0.1   # Yaw variance
      
    velocity_covariance:
      vx: 0.1    # Linear X velocity variance
      vy: 0.1    # Linear Y velocity variance
      vz: 0.1    # Linear Z velocity variance
      wx: 0.1    # Angular X velocity variance
      wy: 0.1    # Angular Y velocity variance
      wz: 0.1    # Angular Z velocity variance
