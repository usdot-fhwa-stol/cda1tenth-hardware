[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600

; Test configuration
[env:test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600
test_framework = unity
test_filter = test_*
build_flags = 
    -DUNIT_TEST
    -DCORE_DEBUG_LEVEL=0
